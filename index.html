<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>os-menos-menos | Cyber-Eden</title>
    <link rel="stylesheet" href="css/main.css">
    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
</head>
<body>
    <div class="scanlines"></div>
    <div class="main-wrapper">
        <header>
            <div class="user-identity">
                <img src="" id="user-display-avatar" class="mini-avatar">
                <span id="user-display-name">Carregando...</span>
            </div>
            <marquee class="y2k-marquee">📉 OS MENOS MENOS — LIVE VIDEO CHAT — 💾</marquee>
        </header>

        <main>
            <section class="content">
                <div class="window">
                    <div class="window-header"><span>Mural dos Miguxos</span></div>
                    <div class="window-body">
                        <form id="social-form">
                            <input type="text" id="user-name-input" placeholder="teu nick..." required>
                            <textarea id="msg-input" placeholder="Diz algo aqui..." required></textarea>
                            <button type="submit" class="btn-neon">ENVIAR ✨</button>
                        </form>
                    </div>
                </div>
                <div id="social-feed" class="dynamic-feed"></div>
            </section>

            <aside class="sidebar">
                <div class="window">
                    <div class="window-header"><span>Câmeras ao Vivo</span></div>
                    <div class="window-body" id="video-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px; background: #000; min-height: 50px; padding: 5px;">
                        <video id="localVideo" autoplay playsinline muted style="width: 100%; border: 1px solid var(--neon-green); transform: scaleX(-1); background: #222;"></video>
                    </div>
                    <div class="window-body" style="border-top: 2px solid var(--deep-purple); padding: 5px;">
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px;">
                            <button id="btn-cam" class="btn-neon" style="font-size: 10px; padding: 10px;">LIGAR CAM</button>
                            <button id="btn-mic" class="btn-neon" style="font-size: 10px; padding: 10px;">LIGAR MIC</button>
                        </div>
                    </div>
                </div>

                <div class="window">
                    <div class="window-header"><span>Teu Perfil</span></div>
                    <div class="window-body"><div id="avatar-selector" class="avatar-grid"></div></div>
                </div>
                
                <div class="window" id="pip-tv">
                    <div class="window-header"><span>Cyber-TV</span></div>
                    <div class="window-body"><div id="tv-screen"></div></div>
                </div>
            </aside>
        </main>
    </div>
    <script type="module" src="js/app.js"></script>
</body>
</html>
