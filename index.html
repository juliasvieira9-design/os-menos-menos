<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>os-menos-menos | Cyber-Eden</title>
    <link rel="stylesheet" href="css/main.css">
    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
</head>
<body>
    <div class="scanlines"></div>
    <div class="main-wrapper">
        <header>
            <div class="user-identity">
                <img src="" id="user-display-avatar" class="mini-avatar">
                <span id="user-display-name">Carregando...</span>
            </div>
            <marquee class="y2k-marquee">📉 OS MENOS MENOS — LIVE — 💾</marquee>
        </header>

        <main>
            <section class="content">
                <div class="window">
                    <div class="window-header"><span>Mural dos Miguxos</span></div>
                    <div class="window-body">
                        <form id="social-form">
                            <input type="text" id="user-name-input" placeholder="teu nick..." required>
                            <textarea id="msg-input" placeholder="Diz algo aqui..." required></textarea>
                            <button type="submit" class="btn-neon">ENVIAR ✨</button>
                        </form>
                    </div>
                </div>
                <div id="social-feed" class="dynamic-feed"></div>
            </section>

            <aside class="sidebar">
                <div class="window">
                    <div class="window-header"><span>Câmeras & Voz</span></div>
                    <div class="window-body" style="background: #000; padding: 5px;">
                        <div id="video-grid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px; min-height: 80px;">
                            <video id="localVideo" autoplay playsinline muted style="width: 100%; border: 1px solid var(--neon-green); transform: scaleX(-1); aspect-ratio: 1/1; object-fit: cover; background: #222;"></video>
                        </div>
                        
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-top: 10px;">
                            <div style="text-align: center;">
                                <button id="btn-cam" class="btn-neon" style="font-size: 9px; width: 100%;">ON/OFF CAM</button>
                                <div id="my-id-display" style="font-size: 10px; color: var(--hot-pink); margin-top: 4px; font-weight: bold; font-family: monospace;">ID: ---</div>
                            </div>
                            <button id="btn-mic" class="btn-neon" style="font-size: 9px; height: 26px;">ON/OFF MIC</button>
                        </div>

                        <div style="margin-top: 10px; border-top: 1px dashed #444; padding-top: 10px;">
                            <input type="text" id="peer-id-input" placeholder="ID do amigo..." style="width: 100%; font-size: 10px; margin-bottom: 5px; background: #111; color: #fff; border: 1px solid var(--deep-purple); padding: 5px;">
                            <button id="btn-connect" class="btn-neon" style="width: 100%; font-size: 10px;">CONECTAR📞</button>
                        </div>
                    </div>
                </div>

                <div class="window">
                    <div class="window-header"><span>Teu Perfil</span></div>
                    <div class="window-body"><div id="avatar-selector" class="avatar-grid"></div></div>
                </div>
                
                <div class="window" id="pip-tv">
                    <div class="window-header"><span>Cyber-TV</span></div>
                    <div class="window-body">
                        <div id="tv-screen" style="background: #000; min-height: 120px; display: flex; align-items: center; justify-content: center;">
                            <p style="color: #666; font-size: 11px;">Manda um link do YT!</p>
                        </div>
                    </div>
                </div>
            </aside>
        </main>
    </div>
    <script type="module" src="js/app.js"></script>
</body>
</html>
